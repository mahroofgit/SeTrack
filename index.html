<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SeTrack - Profit Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; font-family: -apple-system, sans-serif; overflow-x: hidden; }
        .item-name { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; font-size: 0.95rem; line-height: 1.2; }
        .high-roi { color: #064e3b; font-weight: 900; }
        .tab-active { color: #2563eb; border-top: 2px solid #2563eb; }
        
        /* Swipe Container Logic */
        .swipe-container { position: relative; overflow: hidden; border-radius: 1rem; margin-bottom: 0.5rem; }
        .swipe-actions { position: absolute; right: 0; top: 0; bottom: 0; display: flex; width: 140px; z-index: 1; }
        .swipe-content { position: relative; z-index: 2; transition: transform 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28); background: white; width: 100%; }
        .swiped { transform: translateX(-140px); }
        
        input[type="date"] { appearance: none; -webkit-appearance: none; min-height: 1.5rem; }
    </style>
</head>
<body class="bg-slate-50 pb-32">
    <div class="max-w-md mx-auto p-4">
        <header class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-black text-slate-800 tracking-tight">SeTrack</h1>
            <div class="flex gap-2 items-center">
                <button onclick="exportBackup()" class="bg-slate-200 text-slate-700 px-3 py-1.5 rounded-lg text-[10px] font-bold uppercase">Backup</button>
                <label class="bg-slate-800 text-white px-3 py-1.5 rounded-lg text-[10px] font-bold uppercase cursor-pointer">
                    Restore <input type="file" id="restore-file" accept=".json" class="hidden" onchange="restoreBackup(this)">
                </label>
                <label class="bg-blue-600 text-white w-8 h-8 flex items-center justify-center rounded-full cursor-pointer ml-1 shadow-md active:scale-90 transition-transform">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    <input type="file" id="batch-file" accept=".csv" class="hidden" onchange="openImportModal(this)">
                </label>
            </div>
        </header>
        
        <div class="bg-slate-900 text-white p-6 rounded-3xl shadow-xl mb-6 flex justify-between items-end">
            <div>
                <p class="text-[10px] opacity-50 font-bold uppercase tracking-widest mb-1">Net Profit</p>
                <h2 id="total-profit" class="text-4xl font-black tracking-tighter">$0.00</h2>
            </div>
            <div class="text-right">
                <p class="text-[10px] opacity-50 font-bold uppercase tracking-widest mb-1">Total Cost</p>
                <p id="total-paid-display" class="text-xl font-bold opacity-90">$0.00</p>
            </div>
        </div>

        <div id="add-section" class="bg-white p-5 rounded-3xl shadow-sm border border-slate-200 mb-6">
            <input id="in-name" type="text" placeholder="Item Name" class="w-full mb-3 p-4 bg-slate-100 rounded-2xl outline-none">
            <div class="mb-4">
                <label class="text-[10px] font-bold text-slate-400 uppercase ml-2 mb-1 block">Purchase Date</label>
                <input id="in-date" type="date" class="w-full p-4 bg-slate-100 rounded-2xl outline-none font-bold text-slate-700">
            </div>
            <div class="grid grid-cols-2 gap-3 mb-4">
                <input id="in-buy" type="number" inputmode="decimal" placeholder="Shelf Price" class="w-full p-4 bg-slate-100 rounded-2xl outline-none">
                <input id="in-premium" type="number" inputmode="decimal" value="16" class="w-full p-4 bg-slate-100 rounded-2xl outline-none text-center font-bold">
                <input id="in-fee" type="number" inputmode="decimal" value="1.50" class="w-full p-4 bg-slate-100 rounded-2xl outline-none text-center font-bold">
                <input id="in-tax" type="number" inputmode="decimal" value="13" class="w-full p-4 bg-slate-100 rounded-2xl outline-none text-center font-bold">
            </div>
            <button onclick="addItem()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl active:scale-95 uppercase">Add to Inventory</button>
        </div>

        <div id="item-list" class="space-y-4"></div>

        <div id="trash-section" class="mt-12 pt-8 border-t border-slate-200 hidden">
            <div class="flex justify-between items-center mb-4">
                <button onclick="toggleTrash()" class="text-slate-400 text-xs font-bold uppercase flex items-center gap-2">View Trash (<span id="trash-count">0</span>)</button>
                <button onclick="emptyTrash()" class="text-red-500 text-[10px] font-black uppercase">Empty Trash</button>
            </div>
            <div id="trash-list" class="hidden space-y-2"></div>
        </div>
    </div>

    <div id="import-overlay" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[110] hidden flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-xs rounded-3xl p-6 shadow-2xl text-center">
            <h3 class="font-black text-slate-800 uppercase mb-4">Import Date</h3>
            <input id="import-date-input" type="date" class="w-full p-4 bg-slate-100 rounded-2xl mb-6">
            <div class="flex gap-3"><button onclick="closeImportModal()" class="flex-1 font-bold text-slate-400 uppercase text-[10px]">Cancel</button><button onclick="confirmImport()" class="flex-1 py-3 bg-blue-600 text-white font-bold rounded-xl uppercase text-[10px]">Import</button></div>
        </div>
    </div>

    <div id="sale-overlay" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-xs rounded-3xl p-6 shadow-2xl">
            <h3 class="text-center font-black text-slate-800 uppercase mb-4">Sale Price</h3>
            <input id="modal-sell-input" type="number" inputmode="decimal" class="w-full text-center text-3xl font-black p-4 bg-slate-100 rounded-2xl mb-4">
            <div id="edit-sold-options" class="hidden mb-4"><button onclick="resetToUnsold()" class="w-full py-3 bg-slate-100 text-slate-500 font-bold rounded-xl uppercase text-[10px]">Reset to Unsold</button></div>
            <div class="flex gap-3"><button onclick="closeSaleModal()" class="flex-1 font-bold text-slate-400 uppercase text-[10px]">Cancel</button><button onclick="confirmSale()" class="flex-1 py-3 bg-blue-600 text-white font-bold rounded-xl uppercase text-[10px]">Save</button></div>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 flex justify-around items-center py-3 pb-8 z-50">
        <button onclick="switchTab('inventory')" id="tab-inventory" class="flex flex-col items-center gap-1 text-slate-400 tab-active"><span class="text-[9px] font-bold uppercase">Inventory</span></button>
        <button onclick="switchTab('sold')" id="tab-sold" class="flex flex-col items-center gap-1 text-slate-400"><span class="text-[9px] font-bold uppercase">Sold</span></button>
        <button onclick="switchTab('archive')" id="tab-archive" class="flex flex-col items-center gap-1 text-slate-400"><span class="text-[9px] font-bold uppercase">Archive</span></button>
    </nav>

    <script>
        let data = JSON.parse(localStorage.getItem('tracker_db')) || [];
        let trash = JSON.parse(localStorage.getItem('tracker_trash')) || [];
        let currentTab = 'inventory';
        let activeSaleId = null;
        let pendingImportFile = null;
        let startX = 0;

        document.getElementById('in-date').value = new Date().toISOString().split('T')[0];

        function update() {
            localStorage.setItem('tracker_db', JSON.stringify(data));
            localStorage.setItem('tracker_trash', JSON.stringify(trash));
            render();
        }

        // --- SWIPE ENGINE ---
        function ts(e) { startX = e.touches[0].clientX; }
        function te(e, id) {
            let diff = startX - e.changedTouches[0].clientX;
            const row = document.getElementById(`row-${id}`);
            if (currentTab !== 'inventory') return; // Swipe only on inventory
            if (diff > 50) row.classList.add('swiped');
            else if (diff < -50) row.classList.remove('swiped');
        }

        function addItem() {
            const name = document.getElementById('in-name').value;
            const shelf = parseFloat(document.getElementById('in-buy').value);
            const date = document.getElementById('in-date').value;
            if(!name || isNaN(shelf)) return;
            const prem = 1 + (parseFloat(document.getElementById('in-premium').value)/100);
            const fee = parseFloat(document.getElementById('in-fee').value);
            const tax = 1 + (parseFloat(document.getElementById('in-tax').value)/100);
            data.push({ id: Date.now(), name, date, listedPrice: shelf, totalPaid: ((shelf * prem) + fee) * tax, sell: 0, profit: 0, sold: false, archived: false });
            document.getElementById('in-name').value = ''; document.getElementById('in-buy').value = ''; update();
        }

        function switchTab(tab) {
            currentTab = tab;
            ['inventory', 'sold', 'archive'].forEach(t => document.getElementById(`tab-${t}`).classList.toggle('tab-active', tab === t));
            document.getElementById('add-section').classList.toggle('hidden', tab !== 'inventory');
            document.getElementById('trash-section').classList.toggle('hidden', tab !== 'archive');
            render();
        }

        function render() {
            const list = document.getElementById('item-list');
            const trashList = document.getElementById('trash-list');
            list.innerHTML = ''; trashList.innerHTML = '';
            
            let profit = 0, cost = 0;
            data.forEach(i => { if(i.sold) profit += i.profit; cost += i.totalPaid; });

            const filtered = data.filter(i => {
                if (currentTab === 'inventory') return !i.sold && !i.archived;
                if (currentTab === 'sold') return i.sold;
                if (currentTab === 'archive') return i.archived;
            });

            filtered.forEach(item => {
                const container = document.createElement('div');
                container.className = "swipe-container";
                
                // Only build actions for inventory tab
                const actionsHtml = currentTab === 'inventory' ? `
                    <div class="swipe-actions">
                        <button onclick="toggleArchive(${item.id})" class="flex-1 bg-amber-500 text-white font-black text-[9px] uppercase">Archive</button>
                        <button onclick="moveToTrash(${item.id})" class="flex-1 bg-red-600 text-white font-black text-[9px] uppercase">Delete</button>
                    </div>` : '';

                container.innerHTML = `
                    ${actionsHtml}
                    <div id="row-${item.id}" class="swipe-content p-4 border rounded-2xl flex justify-between items-center ${item.sold || item.archived ? 'bg-slate-50 opacity-70' : ''}" 
                         ontouchstart="ts(event)" ontouchend="te(event, ${item.id})">
                        <div class="flex-1 pr-4">
                            <p class="font-bold text-slate-800 item-name">${item.name}</p>
                            <p class="text-[9px] font-bold text-slate-400 mt-1 uppercase tracking-tight">$${item.totalPaid.toFixed(2)} cost | ${item.date}</p>
                        </div>
                        ${item.sold ? `<div class="text-right text-green-600 font-black text-sm">$${item.profit.toFixed(2)}</div>` : 
                          item.archived ? `<button onclick="toggleArchive(${item.id})" class="bg-blue-100 text-blue-600 px-3 py-1 rounded-lg font-black text-[9px] uppercase">Restore</button>` :
                          `<button onclick="sellItem(${item.id})" class="bg-blue-600 text-white px-4 py-2 rounded-xl font-black text-[10px] uppercase">Sell</button>`}
                    </div>`;
                list.appendChild(container);
            });

            trash.forEach(item => {
                const card = document.createElement('div');
                card.className = "p-4 bg-slate-200/50 rounded-2xl flex justify-between items-center";
                card.innerHTML = `<span class="font-bold text-xs text-slate-600">${item.name}</span>
                                  <div class="flex gap-2"><button onclick="restoreItem(${item.id})" class="text-blue-600 font-bold text-[9px] uppercase">Restore</button>
                                  <button onclick="permanentDelete(${item.id})" class="text-red-600 font-bold text-[9px] uppercase">Burn</button></div>`;
                trashList.appendChild(card);
            });

            document.getElementById('total-profit').innerText = `$${profit.toFixed(2)}`;
            document.getElementById('total-paid-display').innerText = `$${cost.toFixed(2)}`;
            document.getElementById('trash-count').innerText = trash.length;
        }

        // Standard Utility Functions
        function toggleArchive(id) { const i = data.find(x => x.id === id); if(i) i.archived = !i.archived; update(); }
        function moveToTrash(id) { trash.push(data.find(x => x.id === id)); data = data.filter(x => x.id !== id); update(); }
        function restoreItem(id) { data.push(trash.find(x => x.id === id)); trash = trash.filter(x => x.id !== id); update(); }
        function permanentDelete(id) { if(confirm("Delete forever?")) { trash = trash.filter(x => x.id !== id); update(); } }
        function toggleTrash() { document.getElementById('trash-list').classList.toggle('hidden'); }
        function emptyTrash() { if(confirm("Clear all?")) { trash = []; update(); } }
        function sellItem(id) { activeSaleId = id; const i = data.find(x => x.id === id); document.getElementById('sale-overlay').classList.remove('hidden'); document.getElementById('modal-sell-input').value = i.sold ? i.sell : ''; document.getElementById('edit-sold-options').classList.toggle('hidden', !i.sold); }
        function confirmSale() { const val = parseFloat(document.getElementById('modal-sell-input').value); const i = data.find(x => x.id === activeSaleId); if(i && !isNaN(val)) { i.sell = val; i.profit = val - i.totalPaid; i.sold = true; update(); } closeSaleModal(); }
        function resetToUnsold() { const i = data.find(x => x.id === activeSaleId); if(i) { i.sold = false; i.sell = 0; i.profit = 0; update(); } closeSaleModal(); }
        function closeSaleModal() { document.getElementById('sale-overlay').classList.add('hidden'); }
        function openImportModal(input) { if (input.files[0]) { pendingImportFile = input.files[0]; document.getElementById('import-overlay').classList.remove('hidden'); } }
        function closeImportModal() { document.getElementById('import-overlay').classList.add('hidden'); }
        function confirmImport() { const date = document.getElementById('import-date-input').value; const reader = new FileReader(); reader.onload = (e) => { e.target.result.split('\n').slice(1).forEach(row => { const c = row.split(','); if(c.length > 1) data.push({ id: Date.now()+Math.random(), date, name: c[0].replace(/"/g,'').trim(), listedPrice: parseFloat(c[1])||0, totalPaid: parseFloat(c[2])||0, sell:0, profit:0, sold:false, archived:false }); }); update(); closeImportModal(); }; reader.readAsText(pendingImportFile); }
        function exportBackup() { const blob = new Blob([JSON.stringify({data, trash})], {type:'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'SeTrack_Backup.json'; a.click(); }
        function restoreBackup(input) { const reader = new FileReader(); reader.onload = (e) => { const b = JSON.parse(e.target.result); if(b.data) { data = b.data; trash = b.trash || []; update(); } }; reader.readAsText(input.files[0]); }

        render();
    </script>
</body>
</html>
