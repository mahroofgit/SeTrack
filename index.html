<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Profit Tracker</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; font-family: -apple-system, sans-serif; }
    </style>
</head>
<body class="bg-slate-50 pb-20">
    <div class="max-w-md mx-auto p-4">
        <header class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-black text-slate-800">Inventory</h1>
            <div class="flex gap-2">
                <button onclick="exportCSV()" class="bg-slate-200 text-slate-700 px-3 py-1 rounded-lg text-xs font-bold uppercase">Export</button>
                <label class="bg-blue-600 text-white px-3 py-1 rounded-lg text-xs font-bold cursor-pointer uppercase">
                    Import <input type="file" id="csv-file" accept=".csv" class="hidden" onchange="importCSV(this)">
                </label>
            </div>
        </header>
        
        <div class="bg-slate-900 text-white p-6 rounded-3xl shadow-xl mb-8">
            <p class="text-xs opacity-60 font-bold uppercase tracking-widest mb-1 text-blue-400">Total Net Profit</p>
            <h2 id="total-profit" class="text-4xl font-black">$0.00</h2>
        </div>

        <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-200 mb-8">
            <input id="in-name" type="text" placeholder="Item Name" class="w-full mb-3 p-4 bg-slate-100 rounded-2xl outline-none">
            <div class="flex gap-3 mb-4">
                <input id="in-buy" type="number" placeholder="Cost" class="w-1/2 p-4 bg-slate-100 rounded-2xl outline-none">
                <input id="in-tax" type="number" placeholder="Tax %" value="13" class="w-1/4 p-4 bg-slate-100 rounded-2xl outline-none text-center">
            </div>
            <button onclick="addItem()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl active:scale-95 transition-all">Add to List</button>
        </div>

        <div id="item-list" class="space-y-3"></div>
    </div>

    <script>
        let data = JSON.parse(localStorage.getItem('tracker_db')) || [];

        function addItem() {
            const name = document.getElementById('in-name').value;
            const buy = parseFloat(document.getElementById('in-buy').value);
            const tax = parseFloat(document.getElementById('in-tax').value) / 100;
            if(!name || isNaN(buy)) return;
            const totalCost = buy * (1 + tax);
            data.push({ id: Date.now(), name, totalCost, sell: 0, profit: 0, sold: false });
            update();
            document.getElementById('in-name').value = '';
            document.getElementById('in-buy').value = '';
        }

        function sellItem(id) {
            const price = prompt("Sale Price?");
            if (price === null || isNaN(parseFloat(price))) return;
            const item = data.find(i => i.id === id);
            item.sell = parseFloat(price);
            item.profit = item.sell - item.totalCost;
            item.sold = true;
            update();
        }

        function deleteItem(id) {
            if(confirm("Permanently delete this item?")) {
                data = data.filter(item => item.id !== id);
                update();
            }
        }

        function exportCSV() {
            let csv = "Name,Cost,Sell,Profit,Sold\n";
            data.forEach(i => csv += `"${i.name}",${i.totalCost.toFixed(2)},${i.sell},${i.profit},${i.sold}\n`);
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `inventory_backup.csv`;
            a.click();
        }

        function importCSV(input) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const rows = e.target.result.split('\n');
                rows.forEach((row, index) => {
                    if (index === 0 || !row.trim()) return; // Skip header/empty
                    const c = row.split(',');
                    if(c.length < 2) return;
                    
                    // Maps column 1 (Total/Cost) from your input list
                    data.push({ 
                        id: Date.now() + Math.random(), 
                        name: c[0].replace(/"/g,''), 
                        totalCost: parseFloat(c[1]), // Taking the total cost directly
                        sell: parseFloat(c[2]) || 0, 
                        profit: parseFloat(c[3]) || 0, 
                        sold: c[4]?.trim().toLowerCase() === 'true' 
                    });
                });
                update();
            };
            reader.readAsText(input.files[0]);
        }

        function update() {
            localStorage.setItem('tracker_db', JSON.stringify(data));
            render();
        }

        function render() {
            const list = document.getElementById('item-list');
            let totalProfit = 0;
            list.innerHTML = '';
            data.sort((a,b) => b.id - a.id).forEach(item => {
                if(item.sold) totalProfit += item.profit;
                const card = document.createElement('div');
                card.className = `p-4 rounded-2xl flex justify-between items-center border ${item.sold ? 'bg-green-50 border-green-200' : 'bg-white border-slate-200 shadow-sm'}`;
                
                card.innerHTML = `
                    <div class="flex-1 min-w-0 pr-2">
                        <p class="font-bold text-slate-800 truncate">${item.name}</p>
                        <p class="text-xs opacity-50">$${item.totalCost.toFixed(2)} total cost</p>
                    </div>
                    <div class="flex items-center gap-2">
                        ${item.sold ? 
                            `<p class="font-black text-green-600 text-sm">+$${item.profit.toFixed(2)}</p>` : 
                            `<button onclick="sellItem(${item.id})" class="bg-blue-100 text-blue-600 text-xs font-bold px-3 py-2 rounded-xl">SELL</button>`
                        }
                        <button onclick="deleteItem(${item.id})" class="text-slate-300 active:text-red-500 p-2">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                        </button>
                    </div>
                `;
                list.appendChild(card);
            });
            document.getElementById('total-profit').innerText = `$${totalProfit.toFixed(2)}`;
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => navigator.serviceWorker.register('sw.js'));
        }
        render();
    </script>
</body>
</html>
