<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>SeTrack Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        -webkit-tap-highlight-color: transparent;
        font-family: -apple-system, sans-serif;
        overflow-x: hidden;
        touch-action: manipulation;
      }
      .item-name {
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        font-size: 0.95rem;
        line-height: 1.2;
        font-weight: 700;
        cursor: pointer;
      }
      .high-roi {
        color: #064e3b;
        font-weight: 900;
      }
      .tab-active {
        color: #2563eb;
        border-top: 3px solid #2563eb;
      }
      .swipe-container {
        position: relative;
        overflow: hidden;
        border-radius: 0.6rem;
        margin-bottom: 0.4rem;
      }
      .swipe-actions {
        position: absolute;
        right: 0;
        top: 0;
        bottom: 0;
        display: flex;
        width: 110px;
        z-index: 1;
      }
      .swipe-content {
        position: relative;
        z-index: 2;
        transition: transform 0.2s ease-out;
        background: white;
        width: 100%;
      }
      .swiped {
        transform: translateX(-110px);
      }
      .fee-btn {
        transition: all 0.1s;
        border: 1px solid #e2e8f0;
        background: #f8fafc;
        color: #64748b;
        font-size: 0.75rem;
        padding: 4px 8px;
        border-radius: 6px;
        font-weight: 800;
      }
      .fee-btn.active {
        background-color: #dbeafe;
        color: #1e40af;
        border-color: #93c5fd;
      }

      .calc-container {
        height: calc(100dvh - 190px);
      }
      .numpad-btn {
        background: white;
        border: 1px solid #e2e8f0;
        border-radius: 0.6rem;
        font-weight: 800;
        font-size: 1.3rem;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.05s;
        min-height: 48px;
      }
      .numpad-btn:active {
        background-color: #eff6ff;
        transform: scale(0.95);
      }
    </style>
  </head>
  <body class="bg-slate-50 pb-20 text-slate-900">
    <div class="max-w-md mx-auto p-3">
      <header class="flex justify-between items-center mb-3 px-1">
        <h1 class="text-lg font-black tracking-tighter text-slate-800">
          SeTrack
        </h1>
        <div class="flex gap-1.5 items-center">
          <button
            onclick="exportBackup()"
            class="bg-slate-200 text-slate-700 px-2 py-1 rounded text-[8px] font-black uppercase"
          >
            Backup
          </button>
          <label
            class="bg-slate-800 text-white px-2 py-1 rounded text-[8px] font-black uppercase cursor-pointer"
          >
            Restore
            <input
              type="file"
              id="restore-file"
              accept=".json"
              class="hidden"
              onchange="handleRestore(this)"
            />
          </label>
          <button
            onclick="toggleAddModal()"
            class="bg-blue-600 text-white w-7 h-7 flex items-center justify-center rounded-full shadow-md"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="4"
            >
              <line x1="12" y1="5" x2="12" y2="19" />
              <line x1="5" y1="12" x2="19" y2="12" />
            </svg>
          </button>
          <label
            class="bg-blue-100 text-blue-600 w-7 h-7 flex items-center justify-center rounded-full cursor-pointer"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="3"
            >
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
              <polyline points="17 8 12 3 7 8" />
              <line x1="12" y1="3" x2="12" y2="15" />
            </svg>
            <input
              type="file"
              id="csv-input"
              accept=".csv"
              class="hidden"
              onchange="openImportModal(this)"
            />
          </label>
        </div>
      </header>

      <div
        class="bg-slate-900 text-white p-4 rounded-2xl shadow-xl mb-3 flex justify-between items-end"
      >
        <div>
          <p class="text-[8px] opacity-60 font-bold uppercase tracking-widest">
            Net Profit
          </p>
          <h2 id="total-profit" class="text-2xl font-black tracking-tighter">
            $0.00
          </h2>
        </div>
        <div class="text-right">
          <p class="text-[8px] opacity-60 font-bold uppercase tracking-widest">
            Inv Cost
          </p>
          <p id="total-cost" class="text-lg font-bold opacity-90">$0.00</p>
        </div>
      </div>

      <div id="main-view">
        <div class="relative mb-3">
          <input
            id="search-input"
            type="text"
            placeholder="Search items..."
            oninput="render()"
            class="w-full p-2.5 pl-9 bg-white border border-slate-200 rounded-xl outline-none text-xs font-medium"
          />
          <svg
            class="absolute left-3 top-3 text-slate-400"
            xmlns="http://www.w3.org/2000/svg"
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="3"
          >
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
        </div>
        <div id="item-list"></div>

        <div
          id="trash-section"
          class="mt-6 pt-4 border-t border-slate-200 hidden"
        >
          <div class="flex justify-between items-center mb-3 px-1">
            <button
              onclick="toggleTrash()"
              class="text-slate-400 text-[9px] font-black uppercase flex items-center gap-1"
            >
              Trash Bin (<span id="trash-count">0</span>)
            </button>
            <button
              onclick="emptyTrash()"
              class="text-red-500 text-[9px] font-black uppercase tracking-wider"
            >
              Wipe All
            </button>
          </div>
          <div id="trash-list" class="hidden space-y-2 pb-10"></div>
        </div>
      </div>

      <div id="calc-view" class="hidden flex-col calc-container">
        <div class="text-center py-3 shrink-0">
          <p
            class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1"
          >
            Final Total
          </p>
          <h2
            id="calc-tab-total"
            class="text-5xl font-black text-blue-600 tracking-tighter"
          >
            $0.00
          </h2>
        </div>
        <div class="grid grid-cols-2 gap-2 mb-3 shrink-0">
          <div class="bg-white border border-slate-200 p-2 rounded-xl">
            <label class="text-[8px] font-bold text-slate-400 uppercase block"
              >Bid ($)</label
            ><input
              id="calc-tab-buy"
              type="text"
              readonly
              class="w-full bg-transparent font-black text-base outline-none"
            />
          </div>
          <div
            class="bg-white border border-slate-200 p-2 rounded-xl flex flex-col justify-between"
          >
            <label class="text-[8px] font-bold text-slate-400 uppercase block"
              >Fee ($)</label
            >
            <input
              id="calc-tab-fee"
              type="number"
              value="1.50"
              oninput="runStandaloneCalc()"
              class="w-full bg-transparent font-bold text-sm outline-none mb-1"
            />
            <div class="flex gap-1">
              <button
                onclick="setCalcQuickFee(1.5, 'ENC')"
                id="calc-btn-enc"
                class="fee-btn active text-[6px] px-1 py-0.5"
              >
                ENC
              </button>
              <button
                onclick="setCalcQuickFee(1.0, 'AMZ')"
                id="calc-btn-amz"
                class="fee-btn text-[6px] px-1 py-0.5"
              >
                AMZ
              </button>
            </div>
          </div>
          <div class="bg-white border border-slate-200 p-2 rounded-xl">
            <label class="text-[8px] font-bold text-slate-400 uppercase block"
              >Prem %</label
            ><input
              id="calc-tab-prem"
              type="number"
              value="16"
              oninput="runStandaloneCalc()"
              class="w-full bg-transparent font-bold text-sm outline-none"
            />
          </div>
          <div class="bg-white border border-slate-200 p-2 rounded-xl">
            <label class="text-[8px] font-bold text-slate-400 uppercase block"
              >Tax %</label
            ><input
              id="calc-tab-tax"
              type="number"
              value="13"
              oninput="runStandaloneCalc()"
              class="w-full bg-transparent font-bold text-sm outline-none"
            />
          </div>
        </div>
        <div class="grid grid-cols-3 gap-2 grow mb-3">
          <button onclick="pressNum('1')" class="numpad-btn">1</button
          ><button onclick="pressNum('2')" class="numpad-btn">2</button
          ><button onclick="pressNum('3')" class="numpad-btn">3</button>
          <button onclick="pressNum('4')" class="numpad-btn">4</button
          ><button onclick="pressNum('5')" class="numpad-btn">5</button
          ><button onclick="pressNum('6')" class="numpad-btn">6</button>
          <button onclick="pressNum('7')" class="numpad-btn">7</button
          ><button onclick="pressNum('8')" class="numpad-btn">8</button
          ><button onclick="pressNum('9')" class="numpad-btn">9</button>
          <button onclick="pressNum('.')" class="numpad-btn">.</button
          ><button onclick="pressNum('0')" class="numpad-btn">0</button
          ><button onclick="pressNum('⌫')" class="numpad-btn text-red-500">
            ⌫
          </button>
          <button
            onclick="pressNum('C')"
            class="col-span-3 numpad-btn text-slate-400 text-[11px] uppercase h-10"
          >
            Clear Bid
          </button>
        </div>
      </div>
    </div>

    <div
      id="add-modal"
      class="fixed inset-0 bg-slate-900/70 backdrop-blur-md z-[150] hidden flex items-center justify-center p-6"
    >
      <div class="bg-white w-full max-w-xs rounded-2xl p-5 shadow-2xl">
        <input
          id="in-name"
          type="text"
          placeholder="Item Name"
          class="w-full mb-3 p-3 bg-slate-100 rounded-lg text-sm font-bold outline-none"
        />
        <div class="grid grid-cols-2 gap-3 mb-4">
          <div class="col-span-2 bg-slate-100 p-2 rounded-lg">
            <label class="text-[8px] font-bold text-slate-400 uppercase"
              >Bid Price ($)</label
            ><input
              id="in-buy"
              type="number"
              class="w-full bg-transparent font-black text-lg outline-none"
            />
          </div>
          <div class="bg-slate-100 p-2 rounded-lg">
            <label class="text-[8px] font-bold text-slate-400 uppercase"
              >Fee ($)</label
            ><input
              id="in-fee"
              type="number"
              value="1.50"
              class="w-full bg-transparent font-bold text-sm outline-none"
            />
          </div>
          <div class="flex items-center justify-around">
            <button
              onclick="setQuickFee(1.5, 'ENC')"
              id="btn-enc"
              class="fee-btn active"
            >
              ENC</button
            ><button
              onclick="setQuickFee(1.0, 'AMZ')"
              id="btn-amz"
              class="fee-btn"
            >
              AMZ
            </button>
          </div>
          <div class="col-span-2 bg-slate-100 p-2 rounded-lg">
            <label class="text-[8px] font-bold text-slate-400 uppercase"
              >Date</label
            ><input
              id="in-date"
              type="date"
              class="w-full bg-transparent font-bold text-xs outline-none"
            />
          </div>
        </div>
        <div class="flex gap-3">
          <button
            onclick="toggleAddModal()"
            class="flex-1 py-3 text-slate-400 font-bold uppercase text-[10px]"
          >
            Cancel</button
          ><button
            onclick="addItem()"
            class="flex-1 bg-blue-600 text-white font-black py-3 rounded-xl uppercase text-[10px]"
          >
            Save Item
          </button>
        </div>
      </div>
    </div>

    <div
      id="sale-modal"
      class="fixed inset-0 bg-slate-900/70 backdrop-blur-md z-[100] hidden flex items-center justify-center p-6"
    >
      <div class="bg-white w-full max-w-xs rounded-2xl p-6 shadow-2xl">
        <h3
          class="text-center font-black text-slate-400 uppercase mb-5 text-[10px] tracking-widest"
        >
          Sale Price
        </h3>
        <input
          id="sale-price"
          type="number"
          inputmode="decimal"
          class="w-full text-center text-4xl font-black p-3 bg-slate-100 rounded-xl outline-none mb-5"
        />
        <button
          id="unsold-opt"
          onclick="markUnsold()"
          class="hidden w-full py-2 mb-5 bg-slate-100 text-slate-400 font-bold rounded-lg uppercase text-[8px]"
        >
          Reset to Unsold
        </button>
        <div class="flex gap-3">
          <button
            onclick="closeSale()"
            class="flex-1 py-3 text-slate-400 font-bold uppercase text-[10px]"
          >
            Cancel</button
          ><button
            onclick="confirmSale()"
            class="flex-1 py-3 bg-blue-600 text-white font-black rounded-xl uppercase text-[10px]"
          >
            Confirm
          </button>
        </div>
      </div>
    </div>

    <div
      id="import-modal"
      class="fixed inset-0 bg-slate-900/80 backdrop-blur-lg z-[200] hidden flex items-center justify-center p-6"
    >
      <div class="bg-white w-full max-w-xs rounded-2xl p-5 shadow-2xl">
        <p
          id="import-filename"
          class="text-[10px] font-black text-blue-600 truncate mb-4 bg-blue-50 p-2 rounded-lg text-center"
        ></p>
        <div class="flex gap-2 mb-4">
          <button
            onclick="setImpSrc('ENC')"
            id="imp-enc"
            class="flex-1 py-3 rounded-lg font-black text-[10px] fee-btn active"
          >
            ENC ($1.50)
          </button>
          <button
            onclick="setImpSrc('AMZ')"
            id="imp-amz"
            class="flex-1 py-3 rounded-lg font-black text-[10px] fee-btn"
          >
            AMZ ($1.00)
          </button>
        </div>
        <input
          id="imp-date"
          type="date"
          class="w-full p-3 bg-slate-100 rounded-lg font-bold text-xs mb-5 outline-none"
        />
        <div class="flex gap-3">
          <button
            onclick="closeImport()"
            class="flex-1 py-3 text-slate-400 font-bold text-[10px]"
          >
            Cancel</button
          ><button
            onclick="confirmImport()"
            class="flex-1 py-3 bg-blue-600 text-white font-black rounded-xl text-[10px]"
          >
            Import All
          </button>
        </div>
      </div>
    </div>

    <nav
      class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 flex justify-around items-center py-3 px-2 pb-6 z-[50]"
    >
      <button
        onclick="switchTab('inventory')"
        id="tab-inventory"
        class="flex flex-col items-center gap-1 text-slate-300 tab-active"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
        >
          <path
            d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"
          /></svg
        ><span class="text-[8px] font-black uppercase">Inv</span>
      </button>
      <button
        onclick="switchTab('sold')"
        id="tab-sold"
        class="flex flex-col items-center gap-1 text-slate-300"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
        >
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
          <polyline points="22 4 12 14.01 9 11.01" /></svg
        ><span class="text-[8px] font-black uppercase">Sold</span>
      </button>
      <button
        onclick="switchTab('calculator')"
        id="tab-calculator"
        class="flex flex-col items-center gap-1 text-slate-300"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
        >
          <rect x="4" y="2" width="16" height="20" rx="2" />
          <line x1="8" y1="6" x2="16" y2="6" />
          <line x1="8" y1="10" x2="16" y2="10" />
          <line x1="8" y1="14" x2="16" y2="14" /></svg
        ><span class="text-[8px] font-black uppercase">Calc</span>
      </button>
      <button
        onclick="switchTab('archive')"
        id="tab-archive"
        class="flex flex-col items-center gap-1 text-slate-300"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
        >
          <polyline points="21 8 21 21 3 21 3 8" />
          <rect x="1" y="3" width="22" height="5" /></svg
        ><span class="text-[8px] font-black uppercase">Arch</span>
      </button>
    </nav>

    <script>
      let db = JSON.parse(localStorage.getItem("sep_db")) || [];
      let trash = JSON.parse(localStorage.getItem("sep_trash")) || [];
      let curTab = "inventory";
      let actId = null;
      let startX = 0;
      let csvFile = null;
      let impSrc = "ENC";

      document.getElementById("in-date").value = new Date()
        .toISOString()
        .split("T")[0];
      document.getElementById("imp-date").value = new Date()
        .toISOString()
        .split("T")[0];

      function save() {
        localStorage.setItem("sep_db", JSON.stringify(db));
        localStorage.setItem("sep_trash", JSON.stringify(trash));
        render();
      }

      function switchTab(t) {
        curTab = t;
        ["inventory", "sold", "archive", "calculator"].forEach((tab) => {
          document
            .getElementById(`tab-${tab}`)
            .classList.toggle("tab-active", t === tab);
        });
        const main = document.getElementById("main-view");
        const calc = document.getElementById("calc-view");
        if (t === "calculator") {
          main.classList.add("hidden");
          calc.classList.remove("hidden");
          calc.classList.add("flex");
        } else {
          main.classList.remove("hidden");
          calc.classList.add("hidden");
          calc.classList.remove("flex");
        }
        document
          .getElementById("trash-section")
          .classList.toggle("hidden", t !== "archive");
        render();
      }

      function pressNum(v) {
        const i = document.getElementById("calc-tab-buy");
        if (v === "C") i.value = "";
        else if (v === "⌫") i.value = i.value.slice(0, -1);
        else {
          if (v === "." && i.value.includes(".")) return;
          i.value += v;
        }
        runStandaloneCalc();
      }

      function setCalcQuickFee(v, t) {
        document.getElementById("calc-tab-fee").value = v.toFixed(2);
        document
          .getElementById("calc-btn-enc")
          .classList.toggle("active", t === "ENC");
        document
          .getElementById("calc-btn-amz")
          .classList.toggle("active", t === "AMZ");
        runStandaloneCalc();
      }

      function runStandaloneCalc() {
        const b =
          parseFloat(document.getElementById("calc-tab-buy").value) || 0;
        const p =
          1 +
          parseFloat(document.getElementById("calc-tab-prem").value || 16) /
            100;
        const f = parseFloat(
          document.getElementById("calc-tab-fee").value || 1.5
        );
        const t =
          1 +
          parseFloat(document.getElementById("calc-tab-tax").value || 13) / 100;
        document.getElementById("calc-tab-total").innerText = `$${(
          (b * p + f) *
          t
        ).toFixed(2)}`;
      }

      function editName(id) {
        const item = db.find((x) => x.id === id);
        const newName = prompt("Edit Item Name:", item.name);
        if (newName !== null && newName.trim() !== "") {
          item.name = newName.trim();
          save();
        }
      }

      function render() {
        if (curTab === "calculator") return;
        const list = document.getElementById("item-list");
        const trList = document.getElementById("trash-list");
        list.innerHTML = "";
        trList.innerHTML = "";
        let pTot = 0,
          cTot = 0;
        db.forEach((i) => {
          if (i.sold) pTot += i.profit;
          cTot += i.totalPaid;
        });

        const filtered = db
          .filter((i) => {
            if (curTab === "inventory") return !i.sold && !i.archived;
            if (curTab === "sold") return i.sold;
            if (curTab === "archive") return i.archived;
            return false;
          })
          .filter((i) =>
            i.name
              .toLowerCase()
              .includes(
                document.getElementById("search-input").value.toLowerCase()
              )
          );

        const groups = filtered.reduce((acc, i) => {
          const key = `${i.date || "N/A"}_${i.source || "ENC"}`;
          if (!acc[key]) acc[key] = [];
          acc[key].push(i);
          return acc;
        }, {});

        Object.keys(groups)
          .sort((a, b) => b.localeCompare(a))
          .forEach((key) => {
            const [date, source] = key.split("_");
            const batch = db.filter(
              (d) => d.date === date && d.source === source
            );
            let bCost = 0,
              bProf = 0,
              bSold = 0;
            batch.forEach((i) => {
              bCost += i.totalPaid;
              if (i.sold) {
                bProf += i.profit;
                bSold += i.sell;
              }
            });
            const be = Math.max(0, bCost - bSold);
            const roi = bCost > 0 ? ((bProf / bCost) * 100).toFixed(0) : 0;

            const head = document.createElement("div");
            head.className = "flex flex-col items-center mb-2 mt-4 px-1";
            head.innerHTML = `
                    <span class="bg-slate-800 text-white text-[8px] font-black px-3 py-1 rounded-full uppercase mb-1">${date}</span>
                    <div class="flex flex-wrap justify-center gap-x-3 gap-y-1 text-[8px] font-bold text-slate-400 uppercase tracking-tight">
                        <span><b class="text-blue-600">${source}</b></span>
                        <span>Cost: <b class="text-slate-800">$${bCost.toFixed(
                          1
                        )}</b></span>
                        <span>Profit: <b class="${
                          bProf >= 0 ? "text-green-600" : "text-red-600"
                        }">$${bProf.toFixed(1)}</b></span>
                        <span>ROI: <b>${roi}%</b></span>
                        <span>BE: <b class="text-slate-800">$${be.toFixed(
                          1
                        )}</b></span>
                    </div>`;
            list.appendChild(head);

            groups[key]
              .sort((a, b) => a.name.localeCompare(b.name))
              .forEach((item) => {
                const row = document.createElement("div");
                row.className = "swipe-container";
                const itemRoi =
                  item.totalPaid > 0
                    ? ((item.profit / item.totalPaid) * 100).toFixed(0)
                    : 0;
                const isHigh = item.sold && item.profit / item.totalPaid >= 1;
                const action =
                  curTab === "inventory"
                    ? `<div class="swipe-actions"><button onclick="toggleArch(${item.id})" class="flex-1 bg-amber-500 text-white font-black text-[8px] uppercase">Arch</button><button onclick="toTrash(${item.id})" class="flex-1 bg-red-600 text-white font-black text-[8px] uppercase">Del</button></div>`
                    : "";

                row.innerHTML = `${action}
                        <div id="row-${
                          item.id
                        }" class="swipe-content p-3 border border-slate-200 rounded-xl flex justify-between items-center ${
                  item.sold || item.archived
                    ? "bg-slate-50 opacity-80"
                    : "shadow-sm"
                }" ontouchstart="ts(event)" ontouchend="te(event, ${item.id})">
                            <div class="flex-1 pr-3 overflow-hidden">
                                <p class="item-name text-slate-800" onclick="editName(${
                                  item.id
                                })">${item.name}</p>
                                <p class="text-[7px] font-bold text-slate-400 uppercase mt-0.5">Bid: $${item.bid.toFixed(
                                  2
                                )} | Paid: $${item.totalPaid.toFixed(2)}</p>
                            </div>
                            <div class="text-right shrink-0">
                                ${
                                  item.sold
                                    ? `<button onclick="sell(${
                                        item.id
                                      })" class="flex flex-col items-end">
                                    <p class="font-black text-xs ${
                                      isHigh
                                        ? "high-roi"
                                        : item.profit >= 0
                                        ? "text-green-600"
                                        : "text-red-600"
                                    }">$${item.profit.toFixed(2)}</p>
                                    <p class="text-[6px] font-black opacity-60 uppercase">${itemRoi}% ROI</p>
                                </button>`
                                    : item.archived
                                    ? `<button onclick="toggleArch(${item.id})" class="text-blue-600 font-black text-[8px] border px-2 py-1 rounded-lg">RESTORE</button>`
                                    : `<button onclick="sell(${item.id})" class="bg-blue-600 text-white px-3 py-1.5 rounded-lg font-black text-[8px] uppercase">Sell</button>`
                                }
                            </div>
                        </div>`;
                list.appendChild(row);
              });
          });

        trash.forEach((i) => {
          const tr = document.createElement("div");
          tr.className =
            "p-2 border border-slate-200 rounded-lg bg-slate-100 flex justify-between items-center opacity-80";
          tr.innerHTML = `<div class="flex-1"><p class="font-bold text-slate-600 text-[10px] truncate">${
            i.name
          }</p>
                    <p class="text-[6px] font-bold text-slate-400 uppercase">Paid: $${i.totalPaid.toFixed(
                      2
                    )} | ${i.date}</p></div>
                    <div class="flex gap-2"><button onclick="revive(${
                      i.id
                    })" class="text-blue-600 font-black text-[7px] border bg-white px-2 py-1 rounded-lg">RESTORE</button>
                    <button onclick="kill(${
                      i.id
                    })" class="text-red-500 font-black text-lg px-2">×</button></div>`;
          trList.appendChild(tr);
        });

        document.getElementById("total-profit").innerText = `$${pTot.toFixed(
          2
        )}`;
        document.getElementById("total-cost").innerText = `$${cTot.toFixed(2)}`;
        document.getElementById("trash-count").innerText = trash.length;
      }

      function ts(e) {
        startX = e.touches[0].clientX;
      }
      function te(e, id) {
        if (curTab !== "inventory") return;
        let d = startX - e.changedTouches[0].clientX;
        const r = document.getElementById(`row-${id}`);
        if (d > 45) r.classList.add("swiped");
        else if (d < -45) r.classList.remove("swiped");
      }

      function toggleArch(id) {
        const i = db.find((x) => x.id === id);
        if (i) i.archived = !i.archived;
        save();
      }
      function toTrash(id) {
        const i = db.find((x) => x.id === id);
        if (i) {
          trash.push(i);
          db = db.filter((x) => x.id !== id);
          save();
        }
      }
      function revive(id) {
        const i = trash.find((x) => x.id === id);
        if (i) {
          db.push(i);
          trash = trash.filter((x) => x.id !== id);
          save();
        }
      }
      function kill(id) {
        if (confirm("Permanently delete this item?")) {
          trash = trash.filter((x) => x.id !== id);
          save();
        }
      }
      function emptyTrash() {
        if (confirm("PERMANENTLY WIPE EVERYTHING in the trash?")) {
          trash = [];
          save();
        }
      }
      function toggleTrash() {
        document.getElementById("trash-list").classList.toggle("hidden");
      }

      function sell(id) {
        actId = id;
        const i = db.find((x) => x.id === id);
        document.getElementById("sale-modal").classList.remove("hidden");
        document.getElementById("sale-price").value = i.sold ? i.sell : "";
        document
          .getElementById("unsold-opt")
          .classList.toggle("hidden", !i.sold);
        setTimeout(() => document.getElementById("sale-price").focus(), 150);
      }
      function confirmSale() {
        const v = parseFloat(document.getElementById("sale-price").value);
        const i = db.find((x) => x.id === actId);
        if (i && !isNaN(v)) {
          i.sell = v;
          i.profit = v - i.totalPaid;
          i.sold = true;
          save();
        }
        closeSale();
      }
      function markUnsold() {
        const i = db.find((x) => x.id === actId);
        if (i) {
          i.sold = false;
          i.sell = 0;
          i.profit = 0;
          save();
        }
        closeSale();
      }
      function closeSale() {
        document.getElementById("sale-modal").classList.add("hidden");
      }

      function addItem() {
        const n = document.getElementById("in-name").value;
        const b = parseFloat(document.getElementById("in-buy").value);
        if (!n || isNaN(b)) return;
        const f = parseFloat(document.getElementById("in-fee").value || 1.5);
        const tot = (b * 1.16 + f) * 1.13;
        db.push({
          id: Date.now(),
          name: n,
          date: document.getElementById("in-date").value,
          bid: b,
          totalPaid: tot,
          sell: 0,
          profit: 0,
          sold: false,
          archived: false,
          source: f === 1.0 ? "AMZ" : "ENC",
        });
        document.getElementById("in-name").value = "";
        document.getElementById("in-buy").value = "";
        save();
        toggleAddModal();
      }

      function exportBackup() {
        const now = new Date();
        const ts =
          now.toISOString().split("T")[0] +
          "_" +
          now.getHours().toString().padStart(2, "0") +
          now.getMinutes().toString().padStart(2, "0");
        const blob = new Blob([JSON.stringify({ db, trash })], {
          type: "application/json",
        });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `backup_${ts}.json`;
        a.click();
      }
      function handleRestore(input) {
        const r = new FileReader();
        r.onload = (e) => {
          try {
            const b = JSON.parse(e.target.result);
            db = b.db || [];
            trash = b.trash || [];
            save();
          } catch (err) {
            alert("Invalid file");
          }
        };
        r.readAsText(input.files[0]);
      }

      function openImportModal(input) {
        if (input.files[0]) {
          csvFile = input.files[0];
          document.getElementById("import-filename").innerText = csvFile.name;
          document.getElementById("import-modal").classList.remove("hidden");
        }
      }
      function closeImport() {
        document.getElementById("import-modal").classList.add("hidden");
      }
      function setImpSrc(s) {
        impSrc = s;
        document
          .getElementById("imp-enc")
          .classList.toggle("active", s === "ENC");
        document
          .getElementById("imp-amz")
          .classList.toggle("active", s === "AMZ");
      }
      function confirmImport() {
        const dt = document.getElementById("imp-date").value;
        const r = new FileReader();
        const fee = impSrc === "ENC" ? 1.5 : 1.0;
        r.onload = (e) => {
          e.target.result
            .split("\n")
            .slice(1)
            .forEach((row) => {
              const c = row.split(",");
              if (c.length > 1) {
                const b = parseFloat(c[1]) || 0;
                const tot = (b * 1.16 + fee) * 1.13;
                db.push({
                  id: Date.now() + Math.random(),
                  date: dt,
                  name: c[0].replace(/"/g, "").trim(),
                  bid: b,
                  totalPaid: tot,
                  sell: 0,
                  profit: 0,
                  sold: false,
                  archived: false,
                  source: impSrc,
                });
              }
            });
          save();
          closeImport();
        };
        r.readAsText(csvFile);
      }

      function toggleAddModal() {
        document.getElementById("add-modal").classList.toggle("hidden");
      }
      function setQuickFee(v, t) {
        document.getElementById("in-fee").value = v.toFixed(2);
        document
          .getElementById("btn-enc")
          .classList.toggle("active", t === "ENC");
        document
          .getElementById("btn-amz")
          .classList.toggle("active", t === "AMZ");
      }

      render();
    </script>
  </body>
</html>
