<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Profit Tracker</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; font-family: -apple-system, sans-serif; }
        .item-name {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            font-size: clamp(0.85rem, 3.5vw, 1rem);
            line-height: 1.2;
        }
    </style>
</head>
<body class="bg-slate-50 pb-24">
    <div class="max-w-md mx-auto p-4">
        <header class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-black text-slate-800">Inventory</h1>
            <div class="flex gap-2">
                <button onclick="exportCSV()" class="bg-slate-200 text-slate-700 px-3 py-1 rounded-lg text-xs font-bold">EXPORT</button>
                <label class="bg-blue-600 text-white px-3 py-1 rounded-lg text-xs font-bold cursor-pointer">
                    IMPORT <input type="file" id="csv-file" accept=".csv" class="hidden" onchange="importCSV(this)">
                </label>
            </div>
        </header>
        
        <div class="bg-slate-900 text-white p-6 rounded-3xl shadow-xl mb-8">
            <p class="text-xs opacity-60 font-bold uppercase tracking-widest mb-1">Total Profit</p>
            <h2 id="total-profit" class="text-4xl font-black">$0.00</h2>
        </div>

        <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-200 mb-8">
            <input id="in-name" type="text" placeholder="Item Name" class="w-full mb-3 p-4 bg-slate-100 rounded-2xl outline-none">
            <div class="flex gap-3 mb-4">
                <input id="in-buy" type="number" placeholder="Cost" class="w-1/2 p-4 bg-slate-100 rounded-2xl outline-none">
                <input id="in-tax" type="number" placeholder="Tax %" value="13" class="w-1/4 p-4 bg-slate-100 rounded-2xl outline-none text-center">
            </div>
            <button onclick="addItem()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl active:scale-95 transition-all uppercase tracking-tight">Add Item</button>
        </div>

        <div id="item-list" class="space-y-3"></div>
    </div>

    <script>
        let data = JSON.parse(localStorage.getItem('tracker_db')) || [];

        function update() {
            localStorage.setItem('tracker_db', JSON.stringify(data));
            render();
        }

        function addItem() {
            const name = document.getElementById('in-name').value;
            const buy = parseFloat(document.getElementById('in-buy').value);
            const tax = parseFloat(document.getElementById('in-tax').value) / 100;
            if(!name || isNaN(buy)) return;
            const totalCost = buy * (1 + tax);
            data.push({ id: Date.now(), name, totalCost, sell: 0, profit: 0, sold: false });
            document.getElementById('in-name').value = '';
            document.getElementById('in-buy').value = '';
            update();
        }

        function editItem(id) {
            const item = data.find(i => i.id === id);
            if (item.sold) {
                if(confirm("Item is already sold. Update sale price? (Cancel to just rename)")) {
                    const newSale = prompt("Enter new Sale Price:", item.sell);
                    if(newSale !== null) {
                        item.sell = parseFloat(newSale);
                        item.profit = item.sell - item.totalCost;
                    }
                } else {
                    const newName = prompt("Rename item:", item.name);
                    if(newName) item.name = newName;
                }
            } else {
                const newName = prompt("Rename item:", item.name);
                if(newName) item.name = newName;
            }
            update();
        }

        function sellItem(id) {
            const price = prompt("Sale Price?");
            if (price === null || isNaN(parseFloat(price))) return;
            const item = data.find(i => i.id === id);
            item.sell = parseFloat(price);
            item.profit = item.sell - item.totalCost;
            item.sold = true;
            update();
        }

        function deleteItem(id) {
            if(confirm("Permanently delete this item?")) {
                data = data.filter(i => i.id !== id);
                update();
            }
        }

        function render() {
            const list = document.getElementById('item-list');
            let totalProfit = 0;
            list.innerHTML = '';

            // Sort logic: Unsold items first (by date), Sold items last (by date)
            const sortedData = [...data].sort((a, b) => {
                if (a.sold === b.sold) return b.id - a.id;
                return a.sold ? 1 : -1;
            });

            sortedData.forEach(item => {
                if(item.sold) totalProfit += item.profit;
                const card = document.createElement('div');
                card.className = `p-4 rounded-2xl flex justify-between items-center border transition-all ${item.sold ? 'bg-slate-100 border-slate-200 opacity-80' : 'bg-white border-slate-200 shadow-sm'}`;
                
                card.innerHTML = `
                    <div class="flex-1 pr-4" onclick="editItem(${item.id})">
                        <p class="font-bold text-slate-800 item-name ${item.sold ? 'line-through opacity-50' : ''}">${item.name}</p>
                        <div class="flex gap-2 mt-1">
                            <span class="text-[10px] font-bold text-slate-400 uppercase">Cost: $${item.totalCost.toFixed(2)}</span>
                            ${item.sold ? `<span class="text-[10px] font-bold text-green-600 uppercase">Sold: $${item.sell.toFixed(2)}</span>` : ''}
                        </div>
                    </div>
                    <div class="flex items-center gap-3">
                        ${item.sold ? 
                            `<p class="font-black text-green-600 text-right text-sm">+$${item.profit.toFixed(2)}</p>` : 
                            `<button onclick="sellItem(${item.id})" class="bg-blue-600 text-white text-[10px] font-black px-4 py-2 rounded-xl uppercase tracking-tighter">Sell</button>`
                        }
                        <button onclick="deleteItem(${item.id})" class="text-slate-300 hover:text-red-500 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>
                        </button>
                    </div>
                `;
                list.appendChild(card);
            });
            document.getElementById('total-profit').innerText = `$${totalProfit.toFixed(2)}`;
        }

        function exportCSV() {
            let csv = "Name,Cost,Sell,Profit,Sold\n";
            data.forEach(i => csv += `"${i.name}",${i.totalCost.toFixed(2)},${i.sell.toFixed(2)},${i.profit.toFixed(2)},${i.sold}\n`);
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = `tracker_${new Date().toISOString().slice(0,10)}.csv`; a.click();
        }

        function importCSV(input) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const rows = e.target.result.split('\n').slice(1);
                rows.forEach(row => {
                    const c = row.split(',');
                    if(c.length < 4) return;
                    data.push({ 
                        id: Date.now() + Math.random(), 
                        name: c[0].replace(/"/g,''), 
                        totalCost: parseFloat(c[1]), 
                        sell: parseFloat(c[2]) || 0, 
                        profit: parseFloat(c[3]) || 0, 
                        sold: c[4]?.trim().toLowerCase() === 'true' 
                    });
                });
                update();
            };
            reader.readAsText(input.files[0]);
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => navigator.serviceWorker.register('sw.js'));
        }
        render();
    </script>
</body>
</html>
