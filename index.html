<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Profit Tracker</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; font-family: -apple-system, sans-serif; }
        .item-name { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; font-size: 0.95rem; line-height: 1.2; }
    </style>
</head>
<body class="bg-slate-50 pb-32">
    <div class="max-w-md mx-auto p-4">
        <header class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-black text-slate-800 tracking-tight">Inventory</h1>
            <div class="flex gap-2">
                <button onclick="exportCSV()" class="bg-slate-200 text-slate-700 px-3 py-1 rounded-lg text-[10px] font-bold uppercase">Export</button>
                <label class="bg-blue-600 text-white px-3 py-1 rounded-lg text-[10px] font-bold uppercase cursor-pointer">
                    Import <input type="file" id="csv-file" accept=".csv" class="hidden" onchange="importCSV(this)">
                </label>
            </div>
        </header>
        
        <div class="bg-slate-900 text-white p-6 rounded-3xl shadow-xl mb-8">
            <p class="text-xs opacity-60 font-bold uppercase tracking-widest mb-1">Total Net Profit</p>
            <h2 id="total-profit" class="text-4xl font-black">$0.00</h2>
        </div>

        <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-200 mb-8">
            <input id="in-name" type="text" placeholder="Item Name" class="w-full mb-3 p-4 bg-slate-100 rounded-2xl outline-none">
            <div class="flex gap-3 mb-4">
                <div class="w-1/2">
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-2 mb-1 block">Shelf Price</label>
                    <input id="in-buy" type="number" placeholder="0.00" class="w-full p-4 bg-slate-100 rounded-2xl outline-none">
                </div>
                <div class="w-1/2">
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-2 mb-1 block">Tax %</label>
                    <input id="in-tax" type="number" value="13" class="w-full p-4 bg-slate-100 rounded-2xl outline-none text-center font-bold">
                </div>
            </div>
            <button onclick="addItem()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl active:scale-95 transition-all uppercase">Add Item</button>
        </div>

        <div id="item-list" class="space-y-3"></div>

        <div class="mt-12 pt-8 border-t border-slate-200">
            <button onclick="toggleTrash()" class="text-slate-400 text-xs font-bold uppercase tracking-widest mb-4 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>
                View Trash (<span id="trash-count">0</span>)
            </button>
            <div id="trash-list" class="hidden space-y-2 opacity-60"></div>
        </div>
    </div>

    <script>
        let data = JSON.parse(localStorage.getItem('tracker_db')) || [];
        let trash = JSON.parse(localStorage.getItem('tracker_trash')) || [];

        function update() {
            localStorage.setItem('tracker_db', JSON.stringify(data));
            localStorage.setItem('tracker_trash', JSON.stringify(trash));
            render();
        }

        function addItem() {
            const name = document.getElementById('in-name').value;
            const listed = parseFloat(document.getElementById('in-buy').value);
            const taxRate = parseFloat(document.getElementById('in-tax').value) / 100;
            if(!name || isNaN(listed)) return;
            const totalPaid = listed * (1 + taxRate);
            data.push({ id: Date.now(), name, listedPrice: listed, totalPaid: totalPaid, sell: 0, profit: 0, sold: false });
            document.getElementById('in-name').value = '';
            document.getElementById('in-buy').value = '';
            update();
        }

        function editItem(id) {
            const item = data.find(i => i.id === id);
            if (item.sold) {
                const newSale = prompt("Update Sale Price:", item.sell);
                if(newSale !== null && !isNaN(parseFloat(newSale))) {
                    item.sell = parseFloat(newSale);
                    item.profit = item.sell - item.totalPaid;
                    update();
                }
            } else {
                const newName = prompt("Rename item:", item.name);
                if(newName) {
                    item.name = newName;
                    update();
                }
            }
        }

        function sellItem(id) {
            const price = prompt("Sale Price?");
            if (price === null || isNaN(parseFloat(price))) return;
            const item = data.find(i => i.id === id);
            item.sell = parseFloat(price);
            item.profit = item.sell - item.totalPaid;
            item.sold = true;
            update();
        }

        function moveToTrash(id) {
            const item = data.find(i => i.id === id);
            trash.push(item);
            data = data.filter(i => i.id !== id);
            update();
        }

        function restoreItem(id) {
            const item = trash.find(i => i.id === id);
            data.push(item);
            trash = trash.filter(i => i.id !== id);
            update();
        }

        function toggleTrash() {
            document.getElementById('trash-list').classList.toggle('hidden');
        }

        function render() {
            const list = document.getElementById('item-list');
            const trashList = document.getElementById('trash-list');
            let totalProfit = 0;
            list.innerHTML = '';
            trashList.innerHTML = '';

            const sortedData = [...data].sort((a, b) => (a.sold === b.sold ? b.id - a.id : (a.sold ? 1 : -1)));

            sortedData.forEach(item => {
                if(item.sold) totalProfit += item.profit;
                const card = document.createElement('div');
                card.className = `p-4 rounded-2xl flex justify-between items-center border ${item.sold ? 'bg-slate-100 border-slate-200' : 'bg-white border-slate-200 shadow-sm'}`;
                card.innerHTML = `
                    <div class="flex-1 pr-4" onclick="editItem(${item.id})">
                        <p class="font-bold text-slate-800 item-name ${item.sold ? 'opacity-40' : ''}">${item.name}</p>
                        <div class="text-[9px] font-bold text-slate-400 mt-1 uppercase">
                            Shelf: $${(item.listedPrice || 0).toFixed(2)} | Paid: $${item.totalPaid.toFixed(2)}
                            ${item.sold ? ` | <span class="text-blue-600">Sold: $${item.sell.toFixed(2)}</span>` : ''}
                        </div>
                    </div>
                    <div class="flex items-center gap-3">
                        ${item.sold ? `<p class="font-black text-green-600 text-sm">+$${item.profit.toFixed(2)}</p>` : `<button onclick="sellItem(${item.id})" class="bg-blue-600 text-white text-[10px] font-black px-4 py-2 rounded-xl uppercase">Sell</button>`}
                        <button onclick="moveToTrash(${item.id})" class="text-slate-300 hover:text-red-500">
                             <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>
                        </button>
                    </div>
                `;
                list.appendChild(card);
            });

            trash.forEach(item => {
                const card = document.createElement('div');
                card.className = "flex justify-between items-center text-xs p-3 bg-slate-200 rounded-xl mb-2";
                card.innerHTML = `<span class="truncate pr-4">${item.name}</span><button onclick="restoreItem(${item.id})" class="text-blue-600 font-bold uppercase text-[10px]">Restore</button>`;
                trashList.appendChild(card);
            });

            document.getElementById('total-profit').innerText = `$${totalProfit.toFixed(2)}`;
            document.getElementById('trash-count').innerText = trash.length;
        }

        function exportCSV() {
            let csv = "Name,ListedPrice,TotalPaid,Sell,Profit,Sold\n";
            data.forEach(i => csv += `"${i.name}",${(i.listedPrice||0).toFixed(2)},${i.totalPaid.toFixed(2)},${i.sell.toFixed(2)},${i.profit.toFixed(2)},${i.sold}\n`);
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = `tracker_${new Date().toISOString().slice(0,10)}.csv`; a.click();
        }

        function importCSV(input) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const rows = e.target.result.split('\n').slice(1);
                rows.forEach(row => {
                    const c = row.split(',');
                    if(c.length < 4) return;
                    data.push({ 
                        id: Date.now() + Math.random(), 
                        name: c[0].replace(/"/g,''), 
                        listedPrice: parseFloat(c[1]) || 0,
                        totalPaid: parseFloat(c[2]) || parseFloat(c[1]) * 1.13, 
                        sell: parseFloat(c[3]) || 0, 
                        profit: parseFloat(c[4]) || 0, 
                        sold: c[5]?.trim().toLowerCase() === 'true' 
                    });
                });
                update();
            };
            reader.readAsText(input.files[0]);
        }

        render();
    </script>
</body>
</html>
